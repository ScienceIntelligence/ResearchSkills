<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Skill — researchskills.ai</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Skill review page styles */
    .skill-header {
      padding: 24px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
      margin-bottom: 20px;
    }
    .skill-header h1 {
      font-size: 1.5em;
      margin-bottom: 12px;
      color: #e6edf3;
    }
    .skill-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.78em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-procedural { background: #1f6feb; color: #fff; }
    .badge-semantic   { background: #8957e5; color: #fff; }
    .badge-episodic   { background: #da3633; color: #fff; }
    .badge-subtype {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
    }
    .badge-domain {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #58a6ff;
    }
    .skill-contributor {
      color: #8b949e;
      font-size: 0.85em;
      margin-left: auto;
    }

    /* Body sections */
    .skill-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 20px;
    }
    .section-card {
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
      overflow: hidden;
    }
    .section-card-header {
      padding: 10px 16px;
      font-weight: 600;
      font-size: 0.9em;
      background: #21262d;
      border-bottom: 1px solid #30363d;
      color: #e6edf3;
    }
    .section-card-body {
      padding: 16px;
      font-size: 0.9em;
      line-height: 1.65;
      color: #c9d1d9;
      white-space: pre-wrap;
    }
    .section-card-body p { margin-bottom: 8px; }
    .section-card-body p:last-child { margin-bottom: 0; }

    /* Procedural: highlight Decision section */
    .section-card.highlight-decision {
      border-color: #1f6feb;
    }
    .section-card.highlight-decision .section-card-header {
      background: #1f3d73;
      color: #79c0ff;
    }

    /* Episodic: timeline flow */
    .timeline-flow {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
    }
    .timeline-step {
      flex: 1;
      border: 1px solid #30363d;
      background: #161b22;
      overflow: hidden;
      position: relative;
    }
    .timeline-step:first-child {
      border-radius: 8px 0 0 8px;
    }
    .timeline-step:last-child {
      border-radius: 0 8px 8px 0;
    }
    .timeline-step:not(:last-child)::after {
      content: '';
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 10px solid #30363d;
      z-index: 1;
    }
    .timeline-step-header {
      padding: 8px 12px;
      font-weight: 600;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #21262d;
      border-bottom: 1px solid #30363d;
      color: #8b949e;
    }
    .timeline-step-body {
      padding: 12px;
      font-size: 0.85em;
      line-height: 1.6;
      color: #c9d1d9;
      white-space: pre-wrap;
    }

    /* Domain/subdomain form */
    .taxonomy-form {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .taxonomy-form label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.85em;
      color: #8b949e;
    }
    .taxonomy-form select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 0.95em;
      min-width: 180px;
    }

    /* Submit section */
    .submit-section {
      display: flex;
      gap: 12px;
      padding: 20px 0;
    }

    /* Login card */
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      margin: 60px auto;
    }
    .login-card h2 { margin-bottom: 12px; font-size: 1.2em; }
    .login-card p  { color: #8b949e; margin-bottom: 20px; font-size: 0.9em; }

    /* Main content area */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    #loading {
      text-align: center;
      padding: 60px 0;
      color: #8b949e;
    }

    /* Responsive timeline */
    @media (max-width: 640px) {
      .timeline-flow {
        flex-direction: column;
      }
      .timeline-step {
        border-radius: 0;
      }
      .timeline-step:first-child { border-radius: 8px 8px 0 0; }
      .timeline-step:last-child  { border-radius: 0 0 8px 8px; }
      .timeline-step::after { display: none; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
</head>
<body>
  <header>
    <a href="/" class="logo">researchskills.ai</a>
    <div id="user-info"></div>
  </header>

  <main>
    <!-- Login prompt -->
    <div id="login-prompt" style="display:none">
      <div class="login-card">
        <h2>Sign in to review your skill</h2>
        <p>We use GitHub to identify contributors.</p>
        <button id="github-login" class="btn btn-primary">Sign in with GitHub</button>
      </div>
    </div>

    <div id="loading">Loading...</div>

    <div id="review-container" style="display:none">
      <!-- Skill header -->
      <div class="skill-header">
        <h1 id="skill-name"></h1>
        <div class="skill-meta">
          <span id="badge-memory-type" class="badge"></span>
          <span id="badge-subtype" class="badge badge-subtype"></span>
          <span id="badge-domain" class="badge badge-domain"></span>
          <span id="skill-contributor" class="skill-contributor"></span>
        </div>
      </div>

      <!-- Domain / subdomain editing -->
      <div class="taxonomy-form">
        <label>Domain
          <select id="skill-domain">
            <option value="">--</option>
            <option value="physics">physics</option>
            <option value="mathematics">mathematics</option>
            <option value="computer-science">computer-science</option>
            <option value="quantitative-biology">quantitative-biology</option>
            <option value="statistics">statistics</option>
            <option value="eess">eess</option>
            <option value="economics">economics</option>
            <option value="quantitative-finance">quantitative-finance</option>
          </select>
        </label>
        <label>Subdomain
          <select id="skill-subdomain">
            <option value="">--</option>
          </select>
        </label>
      </div>

      <!-- Skill body sections -->
      <div id="skill-body" class="skill-body"></div>

      <!-- Submit -->
      <div class="submit-section">
        <button id="save-draft" class="btn btn-secondary">Save Draft</button>
        <button id="submit-skill" class="btn btn-primary">Submit to OpenScientist</button>
      </div>
    </div>

    <div id="submitted-message" style="display:none">
      <h2>Submitted!</h2>
      <p>Your skill has been submitted to OpenScientist. Thank you for contributing.</p>
      <a href="https://github.com/OpenScientists/OpenScientist" class="btn">View on GitHub</a>
    </div>
  </main>

  <script src="/js/auth-header.js"></script>
  <script src="/js/review-skill.js"></script>
</body>
</html>
