<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenScientist — Knowledge Tree</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(160deg, #0a0e18 0%, #121628 50%, #0e1220 100%);
    color: #c8d0e0;
    min-height: 100vh;
    padding: 40px 20px 80px;
    overflow-x: auto;
  }

  header { text-align: center; margin-bottom: 32px; }
  header h1 { font-size: 2.2rem; font-weight: 700; color: #e8ecf4; margin-bottom: 8px; }
  header h1 .emoji { font-size: 2.4rem; }
  header p { font-size: 1rem; color: #7888a8; max-width: 520px; margin: 0 auto; }
  header a { color: #5a9cf5; text-decoration: none; }
  header a:hover { text-decoration: underline; }

  /* ── stats banner ── */
  .stats-banner {
    display: flex; justify-content: center; align-items: center; gap: 32px;
    margin: 0 auto 24px; padding: 20px 32px; max-width: 680px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
  }
  .stat-item { text-align: center; }
  .stat-number { font-size: 2rem; font-weight: 700; color: #e8ecf4; line-height: 1.2; }
  .stat-number.highlight { color: #34d399; }
  .stat-label { font-size: 0.82rem; color: #5a7090; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .stat-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.08); }

  /* ── search bar ── */
  .search-container { max-width: 680px; margin: 0 auto 40px; position: relative; }
  .search-input {
    width: 100%; padding: 12px 44px 12px 16px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; color: #dce2f0; font-size: 0.95rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input::placeholder { color: #4a5a78; }
  .search-input:focus { border-color: rgba(90,156,245,0.4); box-shadow: 0 0 0 3px rgba(90,156,245,0.1); }
  .search-clear {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #5a7090; font-size: 1.2rem;
    cursor: pointer; display: none; padding: 4px; line-height: 1;
  }
  .search-clear.visible { display: block; }
  .search-clear:hover { color: #8898b8; }

  /* ── tree graph layout ── */
  .tree-graph { display: flex; flex-direction: column; align-items: center; min-width: fit-content; }

  .tnode {
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }

  .tnode-box {
    padding: 10px 20px; border-radius: 10px; font-weight: 600; font-size: 0.95rem;
    cursor: pointer; user-select: none; white-space: nowrap; position: relative;
    transition: transform 0.15s, box-shadow 0.2s;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #dce2f0;
  }
  .tnode-box:hover { transform: translateY(-2px); }
  .tnode-box .icon { margin-right: 6px; }
  .tnode-box .code { font-size: 0.72rem; color: #5a7090; margin-left: 8px; font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .tnode-box .badge-count {
    font-size: 0.68rem; background: rgba(255,255,255,0.08); color: #7888a8;
    padding: 1px 7px; border-radius: 8px; margin-left: 8px;
  }

  /* Root node */
  .tnode-root > .tnode-box {
    font-size: 1.4rem; padding: 14px 32px;
    background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15);
    color: #f0f2f8;
  }

  /* Group nodes (Natural Sciences, Formal Sciences) */
  .tnode-group > .tnode-box {
    font-size: 1.05rem; padding: 10px 24px;
    background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12);
    color: #e0e4f0;
  }

  /* Domain nodes — colored, fixed width */
  .tnode-domain {
    width: 300px; align-items: stretch;
  }
  .tnode-domain > .tnode-box {
    font-size: 0.88rem; padding: 10px 16px;
    cursor: pointer; white-space: normal; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .tnode-domain.active > .tnode-box {
    box-shadow: 0 0 20px var(--dcolor, rgba(255,255,255,0.2));
  }
  .dbox-top {
    display: flex; align-items: center; gap: 6px;
  }
  .dbox-top .icon { font-size: 1.2em; }
  .dbox-name {
    font-size: 0.85rem; color: #e8ecf4; line-height: 1.3;
  }

  /* ── tree connector lines ── */
  .tnode-kids {
    display: flex; justify-content: center; align-items: flex-start;
    padding-top: 40px; position: relative;
  }

  /* Vertical line from parent label down to children's horizontal bar */
  .tnode-kids::before {
    content: ''; position: absolute; top: 0; left: 50%;
    width: 1px; height: 20px; background: rgba(74,144,217,0.25);
  }

  /* Each child: vertical line up + horizontal bar segment */
  .tnode-kids > .tnode { padding: 0 12px; position: relative; }

  .tnode-kids > .tnode::before {
    content: ''; position: absolute; top: -20px; left: 50%;
    width: 1px; height: 20px; background: rgba(74,144,217,0.25);
  }
  .tnode-kids > .tnode::after {
    content: ''; position: absolute; top: -20px; left: 0; right: 0;
    height: 1px; background: rgba(74,144,217,0.25);
  }
  .tnode-kids > .tnode:first-child::after { left: 50%; }
  .tnode-kids > .tnode:last-child::after { right: 50%; }
  .tnode-kids > .tnode:only-child::after { display: none; }

  /* ── subdomain panel ── */
  .subdomain-panel {
    width: 100%; margin-top: 8px;
    border-left: 2px solid var(--dcolor, rgba(255,255,255,0.1));
    padding: 4px 0 4px 10px;
    max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease;
  }
  .subdomain-panel.open {
    max-height: 8000px; opacity: 1;
  }


  /* Sub-group header (Astrophysics, Condensed Matter, etc.) */
  .sub-group-header {
    padding: 6px 8px 3px; font-size: 0.8rem; font-weight: 600;
    color: #b8c8e0; cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.15s;
  }
  .sub-group-header:hover { color: #dce4f0; }
  .sub-group-header .sg-arrow {
    font-size: 9px; transition: transform 0.2s; display: inline-block;
  }
  .sub-group-header .sg-arrow.open { transform: rotate(90deg); }
  .sub-group-header .sg-code { font-size: 0.72rem; color: #7888a8; font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .sub-group-header .sg-count { font-size: 0.68rem; color: #4a6080; background: rgba(74,144,217,0.08); padding: 1px 6px; border-radius: 8px; margin-left: auto; }

  .sub-group-kids { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
  .sub-group-kids.open { max-height: 2000px; }

  /* Leaf subdomain item */
  .sub-item {
    padding: 3px 6px; font-size: 0.78rem; color: #d0d8e8;
    transition: background 0.15s; border-radius: 4px;
    line-height: 1.4; padding-left: 16px; position: relative;
  }
  .sub-item::before {
    content: '\2022'; position: absolute; left: 4px; color: #6878a0;
  }
  .sub-item:hover { background: rgba(255,255,255,0.03); }
  .sub-item.search-match { background: rgba(90,156,245,0.08); }
  .sub-item.search-match .sub-name { color: #dce2f0; }
  .sub-item .sub-name { }
  .sub-item .sub-code { font-size: 0.7rem; color: #8898b8; font-family: 'SF Mono','Fira Code','Consolas',monospace; }

  /* Reviewer badge in list */
  .sub-reviewer {
    display: block; margin-top: 2px;
    font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
    border-radius: 10px; cursor: pointer;
    transition: box-shadow 0.2s;
    white-space: nowrap; width: fit-content;
  }
  .sub-reviewer:hover { box-shadow: 0 0 10px var(--dcolor, rgba(52,211,153,0.3)); }

  /* Reviewer detail card (inside panel) */
  .reviewer-card {
    margin: 4px 0 8px 16px; padding: 10px 14px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(52,211,153,0.2);
    border-radius: 8px; animation: card-in 0.2s ease;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reviewer-card .rc-name { font-size: 0.92rem; font-weight: 600; color: #e8ecf4; margin-bottom: 3px; }
  .reviewer-card .rc-role { font-size: 0.82rem; color: #8898b8; margin-bottom: 6px; }
  .reviewer-card .rc-link { display: block; font-size: 0.78rem; color: #5a9cf5; text-decoration: none; margin-bottom: 2px; }
  .reviewer-card .rc-link:hover { text-decoration: underline; }

  /* ── responsive ── */
  @media (max-width: 900px) {
    .tnode-kids > .tnode { padding: 0 6px; }
    .tnode-box { font-size: 0.82rem; padding: 8px 12px; }
    .tnode-root > .tnode-box { font-size: 1.1rem; padding: 12px 24px; }
  }
  @media (max-width: 600px) {
    body { padding: 20px 8px 60px; }
    .stats-banner { gap: 16px; padding: 14px 16px; }
    .stat-number { font-size: 1.4rem; }
    .tnode-box { font-size: 0.75rem; padding: 6px 10px; }
    .tnode-box .code { display: none; }
    .tnode-box .badge-count { display: none; }
    .tnode-root > .tnode-box { font-size: 1rem; }
    .tnode-kids > .tnode { padding: 0 3px; }
    .subdomain-panel { min-width: 280px; max-width: 90vw; }
  }

/* ── helpers ── */
function countLeaves(n) {
  if (!n.children || !n.children.length) return 1;
  return n.children.reduce(function(s,c){ return s + countLeaves(c); }, 0);
}
function countReviewers(arr) {
  var n = 0;
  arr.forEach(function(d) {
    if (d.maintainer) n++;
    if (d.children) n += countReviewers(d.children);
  });
  return n;
}

var totalDomains = 8;
var totalSubs = DATA.reduce(function(s,g){ return s + countLeaves(g); }, 0);
var totalReviewers = countReviewers(DATA);

/* ── stats banner ── */
function mkStat(val, label, hl) {
  var d = document.createElement('div'); d.className = 'stat-item';
  var n = document.createElement('div'); n.className = 'stat-number' + (hl ? ' highlight' : ''); n.textContent = val;
  var l = document.createElement('div'); l.className = 'stat-label'; l.textContent = label;
  d.appendChild(n); d.appendChild(l); return d;
}
function mkDiv(cls) { var d = document.createElement('div'); d.className = cls; return d; }

var banner = document.getElementById('stats-banner');
banner.appendChild(mkStat(totalDomains, 'Domains', false));
banner.appendChild(mkDiv('stat-divider'));
banner.appendChild(mkStat(totalSubs, 'Subcategories', false));
banner.appendChild(mkDiv('stat-divider'));
banner.appendChild(mkStat(totalReviewers, 'Reviewers', true));

/* ── track state ── */
var activePanel = null;
var activeDomain = null;
var openCard = null;

function closePanel() {
  if (activePanel) { activePanel.classList.remove('open'); activePanel = null; }
  if (activeDomain) { activeDomain.classList.remove('active'); activeDomain = null; }
  if (openCard) { openCard.remove(); openCard = null; }
}

/* ── build subdomain panel content ── */
function buildSubdomainPanel(domain, color) {
  var panel = document.createElement('div');
  panel.className = 'subdomain-panel';


  function addLeafItem(sub, parent) {
    var item = document.createElement('div');
    item.className = 'sub-item';
    item._name = (sub.name || '').toLowerCase();
    item._code = (sub.code || '').toLowerCase();

    var nm = document.createElement('span');
    nm.className = 'sub-name';
    nm.textContent = sub.name;
    item.appendChild(nm);

    if (sub.code) {
      var cd = document.createElement('span');
      cd.className = 'sub-code';
      cd.textContent = sub.code;
      item.appendChild(cd);
    }

    if (sub.maintainer) {
      var badge = document.createElement('span');
      badge.className = 'sub-reviewer';
      badge.textContent = sub.maintainer.nameEn;
      badge.style.background = 'linear-gradient(135deg, ' + color + '25, ' + color + '12)';
      badge.style.color = color;
      badge.style.border = '1px solid ' + color + '50';
      badge.addEventListener('click', function(e) {
        e.stopPropagation();
        if (openCard) { var prev = openCard; openCard.remove(); openCard = null; if (prev._gh === sub.maintainer.github) return; }
        var m = sub.maintainer;
        var card = document.createElement('div');
        card.className = 'reviewer-card';
        card._gh = m.github;
        card.style.borderColor = color + '40';

        var rn = document.createElement('div'); rn.className = 'rc-name'; rn.textContent = m.name + ' / ' + m.nameEn; card.appendChild(rn);
        var rr = document.createElement('div'); rr.className = 'rc-role'; rr.textContent = m.role + ' \u00b7 ' + m.affiliation; card.appendChild(rr);
        var rl = document.createElement('a'); rl.className = 'rc-link'; rl.href = 'https://github.com/' + m.github; rl.target = '_blank'; rl.rel = 'noopener'; rl.textContent = '@' + m.github + ' \u2192'; card.appendChild(rl);
        if (m.homepage) {
          var rh = document.createElement('a'); rh.className = 'rc-link'; rh.href = m.homepage; rh.target = '_blank'; rh.rel = 'noopener'; rh.textContent = '\ud83d\udd17 ' + m.homepage.replace(/^https?:\/\//, ''); card.appendChild(rh);
        }
        item.insertAdjacentElement('afterend', card);
        openCard = card;
      });
      item.appendChild(badge);
    }

    parent.appendChild(item);
  }

  function addChildren(children, parentEl) {
    children.forEach(function(sub) {
      if (sub.children && sub.children.length > 0) {
        /* Sub-group (e.g. Astrophysics, Condensed Matter) */
        var hdr = document.createElement('div');
        hdr.className = 'sub-group-header';
        hdr._name = (sub.name || '').toLowerCase();
        hdr._code = (sub.code || '').toLowerCase();

        var arr = document.createElement('span'); arr.className = 'sg-arrow'; arr.textContent = '\u25b6'; hdr.appendChild(arr);
        var hn = document.createElement('span'); hn.textContent = sub.name; hdr.appendChild(hn);
        if (sub.code) { var hc = document.createElement('span'); hc.className = 'sg-code'; hc.textContent = sub.code; hdr.appendChild(hc); }
        var cnt = document.createElement('span'); cnt.className = 'sg-count'; cnt.textContent = sub.children.length; hdr.appendChild(cnt);

        var kids = document.createElement('div');
        kids.className = 'sub-group-kids';

        hdr.addEventListener('click', function() {
          kids.classList.toggle('open');
          arr.classList.toggle('open');
        });

        parentEl.appendChild(hdr);
        addChildren(sub.children, kids);
        parentEl.appendChild(kids);
      } else {
        addLeafItem(sub, parentEl);
      }
    });
  }

  addChildren(domain.children, panel);
  return panel;
}

/* ── build tree graph ── */
var container = document.getElementById('tree-container');
var graph = document.createElement('div');
graph.className = 'tree-graph';

/* Root node */
var rootNode = document.createElement('div');
rootNode.className = 'tnode tnode-root';
var rootBox = document.createElement('div');
rootBox.className = 'tnode-box';
rootBox.textContent = '\ud83c\udf0d OpenScientist';
rootNode.appendChild(rootBox);
graph.appendChild(rootNode);

/* Groups level */
var groupKids = document.createElement('div');
groupKids.className = 'tnode-kids';

DATA.forEach(function(group) {
  var gNode = document.createElement('div');
  gNode.className = 'tnode tnode-group';

  var gBox = document.createElement('div');
  gBox.className = 'tnode-box';
  var gIcon = document.createElement('span'); gIcon.className = 'icon'; gIcon.textContent = group.icon; gBox.appendChild(gIcon);
  var gName = document.createTextNode(group.name); gBox.appendChild(gName);
  gNode.appendChild(gBox);

  /* Domain level */
  var domainKids = document.createElement('div');
  domainKids.className = 'tnode-kids';

  group.children.forEach(function(domain) {
    var dNode = document.createElement('div');
    dNode.className = 'tnode tnode-domain';
    dNode.style.setProperty('--dcolor', domain.color);

    var dBox = document.createElement('div');
    dBox.className = 'tnode-box';
    dBox.style.borderColor = domain.color + '60';
    dBox.style.background = 'linear-gradient(135deg, ' + domain.color + '18, ' + domain.color + '08)';

    var topRow = document.createElement('div'); topRow.className = 'dbox-top';
    var dIcon = document.createElement('span'); dIcon.className = 'icon'; dIcon.textContent = domain.icon; topRow.appendChild(dIcon);
    var leafCount = countLeaves(domain);
    var bc = document.createElement('span'); bc.className = 'badge-count'; bc.textContent = leafCount; topRow.appendChild(bc);
    dBox.appendChild(topRow);

    var dName = document.createElement('div'); dName.className = 'dbox-name'; dName.textContent = domain.name;
    dBox.appendChild(dName);

    dNode.appendChild(dBox);

    /* Subdomain panel */
    var panel = buildSubdomainPanel(domain, domain.color);
    dNode.appendChild(panel);

    dBox.addEventListener('click', function() {
      panel.classList.toggle('open');
      dNode.classList.toggle('active');
    });

    domainKids.appendChild(dNode);
  });

  gNode.appendChild(domainKids);
  groupKids.appendChild(gNode);
});

rootNode.appendChild(groupKids);
container.appendChild(graph);

/* ── search ── */
var searchInput = document.getElementById('search-input');
var searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', function() {
  var q = searchInput.value.trim().toLowerCase();
  searchClear.classList.toggle('visible', q.length > 0);

  /* Reset all search highlights */
  document.querySelectorAll('.sub-item').forEach(function(el) { el.classList.remove('search-match'); });
  document.querySelectorAll('.sub-group-kids').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.sg-arrow').forEach(function(el) { el.classList.remove('open'); });

  if (!q) { closePanel(); return; }

  /* Find first matching domain and open it */
  var bestDomain = null;
  var bestNode = null;

  document.querySelectorAll('.tnode-domain').forEach(function(dNode, idx) {
    var panel = dNode.querySelector('.subdomain-panel');
    if (!panel) return;
    var items = panel.querySelectorAll('.sub-item');
    var headers = panel.querySelectorAll('.sub-group-header');
    var hasMatch = false;

    items.forEach(function(item) {
      if ((item._name && item._name.includes(q)) || (item._code && item._code.includes(q))) {
        item.classList.add('search-match');
        hasMatch = true;
        /* expand parent sub-group if any */
        var prev = item.previousElementSibling;
        var parent = item.parentElement;
        if (parent && parent.classList.contains('sub-group-kids')) {
          parent.classList.add('open');
          var hdr = parent.previousElementSibling;
          if (hdr) {
            var arrow = hdr.querySelector('.sg-arrow');
            if (arrow) arrow.classList.add('open');
          }
        }
      }
    });

    headers.forEach(function(hdr) {
      if ((hdr._name && hdr._name.includes(q)) || (hdr._code && hdr._code.includes(q))) {
        hasMatch = true;
        var kids = hdr.nextElementSibling;
        if (kids) {
          kids.classList.add('open');
          var arrow = hdr.querySelector('.sg-arrow');
          if (arrow) arrow.classList.add('open');
        }
      }
    });

    if (hasMatch && !bestNode) {
      bestNode = dNode;
    }
  });

  /* Open the first matching domain's panel */
  if (bestNode) {
    closePanel();
    var panel = bestNode.querySelector('.subdomain-panel');
    activeDomain = bestNode;
    activePanel = panel;
    bestNode.classList.add('active');
    panel.classList.add('open');
    backdrop.classList.add('open');
  }
});

searchClear.addEventListener('click', function() {
  searchInput.value = '';
  searchInput.dispatchEvent(new Event('input'));
  searchInput.focus();
});
</script>
